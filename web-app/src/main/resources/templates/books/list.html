<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Books - Book Recommendation System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Book Recommendation System</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" href="/books">Books</a>
            <a class="btn btn-outline-light btn-sm" href="/books/add">Add Book</a>
            <a class="btn btn-outline-light btn-sm" href="/rdf/upload">Upload RDF</a>
        </div>
    </div>
</nav>
<main class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Books</h2>
        <a href="/books/add" class="btn btn-success">+ Add Book</a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${#lists.isEmpty(books)}" class="alert alert-info">No books found in the RDF store.</div>

    <div th:unless="${#lists.isEmpty(books)}" class="row row-cols-1 row-cols-md-3 g-4">
        <div th:each="book : ${books}" class="col">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${book.title}"></h5>
                    <p class="card-text text-muted small" th:text="${book.author}"></p>
                    <div class="mb-2">
                        <span th:each="genre : ${book.genres}"
                              class="badge bg-secondary me-1"
                              th:text="${genre}"></span>
                    </div>
                    <span class="badge bg-primary" th:text="${book.readingLevel}"></span>
                </div>
                <div class="card-footer bg-transparent d-flex gap-2">
                    <a th:href="@{/books/{ln}(ln=${book.localName})}"
                       class="btn btn-sm btn-outline-primary">Details</a>
                    <a th:href="@{/books/{ln}/edit(ln=${book.localName})}"
                       class="btn btn-sm btn-outline-secondary">Edit</a>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
