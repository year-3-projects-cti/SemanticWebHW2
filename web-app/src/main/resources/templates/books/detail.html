<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="${book.title} + ' - Book Details'">Book Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Book Recommendation System</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" href="/books">Books</a>
            <a class="btn btn-outline-light btn-sm" href="/books/add">Add Book</a>
            <a class="btn btn-outline-light btn-sm" href="/rdf/upload">Upload RDF</a>
        </div>
    </div>
</nav>
<main class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="d-flex justify-content-between align-items-start mb-3">
                <div>
                    <h2 th:text="${book.title}"></h2>
                    <p class="text-muted" th:text="${book.author}"></p>
                </div>
                <a th:href="@{/books/{ln}/edit(ln=${book.localName})}"
                   class="btn btn-outline-secondary">Edit</a>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <table class="table table-borderless mb-0">
                        <tbody>
                            <tr>
                                <th style="width:160px">Title</th>
                                <td th:text="${book.title}"></td>
                            </tr>
                            <tr>
                                <th>Author</th>
                                <td th:text="${book.author}"></td>
                            </tr>
                            <tr>
                                <th>Genres</th>
                                <td>
                                    <span th:each="genre : ${book.genres}"
                                          class="badge bg-secondary me-1"
                                          th:text="${genre}"></span>
                                    <span th:if="${#lists.isEmpty(book.genres)}" class="text-muted">—</span>
                                </td>
                            </tr>
                            <tr>
                                <th>Reading Level</th>
                                <td>
                                    <span class="badge bg-primary" th:text="${book.readingLevel}"
                                          th:if="${!#strings.isEmpty(book.readingLevel)}"></span>
                                    <span th:if="${#strings.isEmpty(book.readingLevel)}" class="text-muted">—</span>
                                </td>
                            </tr>
                            <tr>
                                <th>RDF URI</th>
                                <td><small class="text-muted font-monospace" th:text="${book.uri}"></small></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="mt-3">
                <a href="/books" class="btn btn-secondary">← Back to Books</a>
            </div>
        </div>
    </div>
</main>
<div th:replace="~{fragments/chat :: chatWidget(${book.title})}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
